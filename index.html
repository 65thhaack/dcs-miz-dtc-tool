<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCS F-16 and F-18 DTC Tool</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --accent: #58a6ff;
      --green: #3fb950;
      --amber: #d29922;
      --red: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
      --mono: 'Courier New', Courier, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; }
    header .sub { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .badge {
      background: rgba(63,185,80,0.1);
      color: var(--green);
      border: 1px solid var(--green);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    main { padding: 24px; max-width: 1440px; margin: 0 auto; }

    /* ── Upload Cards ─────────────────────────────────────────────────── */
    .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .upload-card {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 22px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .upload-card:hover { border-color: var(--accent); background: #161f2e; }
    .upload-card.active { border-color: var(--accent); border-style: solid; background: #161f2e; }
    .upload-card .icon { font-size: 28px; margin-bottom: 8px; }
    .upload-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .upload-card p { color: var(--muted); font-size: 11px; }
    .upload-card .fname { margin-top: 8px; color: var(--green); font-family: var(--mono); font-size: 11px; word-break: break-all; }
    input[type=file] { display: none; }

    /* ── Status Bar ───────────────────────────────────────────────────── */
    .status-bar {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 14px;
      font-family: var(--mono);
      font-size: 12px;
      margin-bottom: 18px;
      display: none;
    }
    .ok  { color: var(--green); }
    .warn { color: var(--amber); }
    .err { color: var(--red); }

    /* ── Section header ───────────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-left {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .section-chevron {
      color: var(--muted);
      font-size: 10px;
      transition: transform 0.15s;
    }
    .section-body.collapsed { display: none; }
    .section-body.collapsed + .section-header .section-chevron,
    .section-header.collapsed .section-chevron { transform: rotate(-90deg); }
    .section-title { font-size: 15px; font-weight: 600; }
    .section-count { color: var(--muted); font-size: 12px; }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { opacity: 0.82; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-success { background: var(--green); color: #0d1117; }
    .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }

    /* ── Controls row ─────────────────────────────────────────────────── */
    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
    }
    .merge-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(63,185,80,0.12);
      border: 1px solid var(--green);
      color: var(--green);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Flight Card ──────────────────────────────────────────────────── */
    .flight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: visible;
    }
    .flight-head {
      background: var(--surface2);
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .flight-name { font-size: 15px; font-weight: 700; color: var(--accent); }
    .flight-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .unit-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }
    /* Collapsible flight cards */
    .flight-head-left {
      display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer; flex: 1; min-width: 0; user-select: none;
    }
    .chevron {
      color: var(--muted); font-size: 10px; margin-top: 5px;
      flex-shrink: 0; transition: transform 0.15s;
    }
    .flight-card.collapsed .chevron { transform: rotate(-90deg); }
    .flight-card.collapsed .tabs,
    .flight-card.collapsed .tab-content { display: none; }
    .chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-family: var(--mono);
      white-space: nowrap;
    }
    .chip .skill { color: var(--muted); }
    .inline-preview-panel {
      display: none;
      margin: 0 16px 16px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--surface2);
      overflow: hidden;
    }
    .inline-preview-panel.open { display: block; }
    .inline-preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(88,166,255,0.08);
    }
    .inline-preview-title { color: var(--accent); font-weight: 700; font-size: 12px; }
    .inline-preview-body { padding: 12px; }
    .inline-preview-section { margin-bottom: 14px; }
    .inline-preview-section:last-child { margin-bottom: 0; }
    .inline-preview-section h4 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Tabs ─────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 2px;
    }
    .tab {
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { padding: 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Tables ───────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
    thead th {
      text-align: left;
      padding: 5px 10px;
      color: var(--muted);
      font-weight: 500;
      font-family: -apple-system, sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    tbody td { padding: 6px 10px; border-bottom: 1px solid #1c2128; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }

    /* ── Waypoint tags ────────────────────────────────────────────────── */
    .wptag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      font-family: -apple-system, sans-serif;
      letter-spacing: 0.04em;
    }
    .wptag-tp   { background: rgba(63,185,80,0.15);  color: var(--green); }
    .wptag-tkof { background: rgba(88,166,255,0.15); color: var(--accent); }
    .wptag-rtb  { background: rgba(248,81,73,0.15);  color: var(--red); }

    /* ── Freq colors ──────────────────────────────────────────────────── */
    .uhf { color: #fbbf24; }
    .vhf { color: #86efac; }
    /* Point-type selector inside waypoints table */
    .pttype {
      background: var(--bg);
      color: var(--green);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 4px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 700;
      cursor: pointer;
      width: 82px;
    }
    .pttype:focus { outline: none; border-color: var(--accent); }
    /* HSD point-type colors */
    .pttype.pt-stpt { color: var(--green);  border-color: var(--border); }
    .pttype.pt-ip   { color: var(--accent); border-color: rgba(88,166,255,0.5); }
    .pttype.pt-tgt  { color: var(--red);    border-color: rgba(248,81,73,0.5); }
    .pttype.pt-vrp  { color: #c084fc;       border-color: rgba(192,132,252,0.5); }
    .pttype.pt-pup  { color: var(--amber);  border-color: rgba(210,153,34,0.5); }
    .pttype.pt-oa1,
    .pttype.pt-oa2  { color: #67e8f9;       border-color: rgba(103,232,249,0.5); }
    /* TargetData sub-row */
    .tgt-data-row td { padding: 0 10px 8px; border-bottom: 1px solid #1c2128; }
    .tgt-data-row { display: none; }
    .tgt-data-wrap {
      display: flex; gap: 14px; flex-wrap: wrap;
      background: rgba(248,81,73,0.05);
      border: 1px solid rgba(248,81,73,0.2);
      border-radius: 5px; padding: 8px 12px;
    }
    .tgt-data-wrap label {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; flex-direction: column; gap: 3px;
    }
    .tgt-inp {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 3px 6px; font-size: 12px;
      font-family: var(--mono); width: 80px;
    }
    .tgt-inp:focus { outline: none; border-color: var(--red); }

    /* ── Empty state ──────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty .ico { font-size: 40px; margin-bottom: 12px; }

    /* Type badges */
    .pt-badge {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 700; font-family: var(--mono);
    }
    .pt-badge.pt-stpt { background: rgba(63,185,80,0.15);   color: var(--green); }
    .pt-badge.pt-ip   { background: rgba(88,166,255,0.15);  color: var(--accent); }
    .pt-badge.pt-tgt  { background: rgba(248,81,73,0.15);   color: var(--red); }
    .pt-badge.pt-vrp  { background: rgba(192,132,252,0.15); color: #c084fc; }
    .pt-badge.pt-pup  { background: rgba(210,153,34,0.15);  color: var(--amber); }
    .pt-badge.pt-oa1,
    .pt-badge.pt-oa2  { background: rgba(103,232,249,0.12); color: #67e8f9; }
    /* EWS pills */
    .ews-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .ews-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 12px;
      font-size: 11px; font-family: var(--mono);
      display: flex; gap: 6px; align-items: center;
    }
    .ews-item .ek { color: var(--muted); }
    .ews-val-on  { color: var(--green); font-weight: 700; }
    .ews-val-off { color: var(--red); font-weight: 700; }
    /* TGT TargetData sub-row in preview */
    .tgt-detail-row td {
      font-size: 11px; color: var(--muted);
      padding: 2px 10px 7px;
      background: rgba(248,81,73,0.04);
      border-bottom: 1px solid #1c2128;
    }

    #results { display: none; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚡ DCS F-16 and F-18 DTC TOOL</h1>
    <div class="sub">Mission file parser &amp; Data Transfer Cartridge generator</div>
  </div>
  <span class="badge">F-16C VIPER + F/A-18C LOT 20</span>
</header>

<main>

  <!-- Upload row -->
  <div class="upload-row">
    <label class="upload-card" id="miz-card" for="miz-input">
      <input type="file" id="miz-input" accept=".miz">
      <div class="icon">📦</div>
      <h3>Mission File (.miz)</h3>
      <p>Click to open or drag &amp; drop your DCS mission</p>
      <div class="fname" id="miz-fname"></div>
    </label>

    <label class="upload-card" id="dtc-card" for="dtc-input">
      <input type="file" id="dtc-input" accept=".dtc">
      <div class="icon">💾</div>
      <h3>Personal DTC Profile <span style="color:var(--muted);font-weight:400">(optional)</span></h3>
      <p>Upload your personal .dtc (from DCS Mission Editor) to merge radio / EW / TACAN data into exports</p>
      <div class="fname" id="dtc-fname"></div>
      <button class="btn btn-outline" id="dtc-clear-btn" style="display:none;margin-top:8px;position:relative;z-index:2" onclick="clearPersonalDtc(event)">✕ Clear</button>
    </label>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar"></div>

  <!-- Results -->
  <div id="results">
    <div class="section-header">
      <div class="section-left" onclick="toggleSection('f16')">
        <span class="section-chevron" id="section-chevron-f16">▼</span>
        <span class="section-title">F-16C Flights</span>
        <span class="section-count" id="section-count-f16"></span>
      </div>
      <div class="controls">
        <span class="merge-pill" id="merge-pill" style="display:none">✓ CMDS merged</span>
      </div>
    </div>

    <div class="section-body" id="section-body-f16">
      <div id="flights-container-f16"></div>

      <div class="empty" id="no-f16s" style="display:none">
        <div class="ico">🔍</div>
        <p>No F-16C player flights found in this mission.</p>
      </div>
    </div>

    <div class="section-header" style="margin-top:28px">
      <div class="section-left" onclick="toggleSection('f18')">
        <span class="section-chevron" id="section-chevron-f18">▼</span>
        <span class="section-title">F/A-18C Flights</span>
        <span class="section-count" id="section-count-f18"></span>
      </div>
      <div class="controls">
      </div>
    </div>

    <div class="section-body" id="section-body-f18">
      <div id="flights-container-f18"></div>

      <div class="empty" id="no-f18s" style="display:none">
        <div class="ico">🔍</div>
        <p>No F/A-18C player flights found in this mission.</p>
      </div>
    </div>

  </div>

  <!-- Initial empty state -->
  <div class="empty" id="empty-state">
    <div class="ico">🗂</div>
    <p>Open a .miz file to begin.</p>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
//  Lua Table Parser
//  Handles the DCS mission Lua format: mission = { ["key"] = value, ... }
// ═══════════════════════════════════════════════════════════════════════════
class LuaParser {
  constructor(src) {
    this.s = src;
    this.p = 0;
    this.n = src.length;
    // Pre-compiled sticky regexes — avoids O(n) substring copy on every call.
    this._reNum  = /-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?/y;
    this._reWord = /[a-zA-Z_]\w*/y;
  }

  skipWS() {
    while (this.p < this.n) {
      const c = this.s[this.p];
      if (c === '-' && this.s[this.p + 1] === '-') {
        this.p += 2;
        while (this.p < this.n && this.s[this.p] !== '\n') this.p++;
      } else if (c === ' ' || c === '\t' || c === '\r' || c === '\n') {
        this.p++;
      } else {
        break;
      }
    }
  }

  parseString() {
    this.p++; // skip opening "
    let out = '';
    let start = this.p;
    while (this.p < this.n && this.s[this.p] !== '"') {
      if (this.s[this.p] === '\\') {
        out += this.s.slice(start, this.p); // flush non-escape chars in bulk
        this.p++;
        const e = this.s[this.p++];
        out += e === 'n' ? '\n' : e === 't' ? '\t' : e === 'r' ? '\r' : e;
        start = this.p;
      } else {
        this.p++;
      }
    }
    out += this.s.slice(start, this.p); // flush remaining chars
    this.p++; // skip closing "
    return out;
  }

  // Sticky-regex versions avoid the O(n) substring copy on every call.
  parseNumber() {
    this._reNum.lastIndex = this.p;
    const m = this._reNum.exec(this.s);
    if (m) { this.p = this._reNum.lastIndex; return parseFloat(m[0]); }
    return 0;
  }

  parseWord() {
    this._reWord.lastIndex = this.p;
    const m = this._reWord.exec(this.s);
    if (m) { this.p = this._reWord.lastIndex; return m[0]; }
    return null;
  }

  parseValue() {
    this.skipWS();
    if (this.p >= this.n) return null;
    const c = this.s[this.p];
    if (c === '{') return this.parseTable();
    if (c === '"') return this.parseString();
    if (c === '-' || (c >= '0' && c <= '9')) return this.parseNumber();
    const saved = this.p;
    const w = this.parseWord();
    if (w === 'true')  return true;
    if (w === 'false') return false;
    if (w === 'nil')   return null;
    if (w) { this.p = saved; }
    return null;
  }

  parseTable() {
    this.p++; // skip {
    const obj = {};
    let ai = 1;
    while (true) {
      this.skipWS();
      if (this.p >= this.n || this.s[this.p] === '}') { this.p++; break; }
      if (this.s[this.p] === ',') { this.p++; continue; }

      if (this.s[this.p] === '[') {
        // Bracketed key: ["str"] or [num]
        this.p++;
        this.skipWS();
        const key = this.s[this.p] === '"' ? this.parseString() : this.parseNumber();
        this.skipWS();
        if (this.s[this.p] === ']') this.p++;
        this.skipWS();
        if (this.s[this.p] === '=') this.p++;
        obj[key] = this.parseValue();
      } else {
        // Bare word: either a key (word = value) or a positional value
        const saved = this.p;
        const w = this.parseWord();
        if (w && w !== 'true' && w !== 'false' && w !== 'nil') {
          this.skipWS();
          if (this.s[this.p] === '=') {
            this.p++;
            obj[w] = this.parseValue();
          } else {
            obj[ai++] = w; // bare word used as positional value
          }
        } else {
          this.p = saved; // restore and parse as value
          const v = this.parseValue();
          if (v !== null && v !== undefined) obj[ai++] = v;
          else this.p++; // skip unknown char
        }
      }
    }
    return obj;
  }

  // Entry point — parses one or more top-level `name = value` assignments
  parse() {
    const top = {};
    while (this.p < this.n) {
      this.skipWS();
      if (this.p >= this.n) break;
      const name = this.parseWord();
      if (!name) { this.p++; continue; }
      this.skipWS();
      if (this.s[this.p] === '=') {
        this.p++;
        top[name] = this.parseValue();
      }
    }
    return top;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  Coordinate Conversion
//  DCS uses flat-earth X (northing) / Y (easting) in meters per theater.
//  Origins derived from known airbase positions (flat-earth approximation).
// ═══════════════════════════════════════════════════════════════════════════
const THEATER_ORIGINS = {
  Caucasus:       { lat: 44.714, lon: 33.732 },
  Nevada:         { lat: 36.000, lon: -116.467 },
  PersianGulf:    { lat: 26.150, lon:  56.260 },  // calibrated vs Al Minhad & Al Dhafra
  Syria:          { lat: 36.000, lon:  33.000 },
  MarianaIslands: { lat: 21.500, lon: 145.000 },
  Sinai:          { lat: 29.000, lon:  32.000 },
  Kola:           { lat: 67.000, lon:  28.000 },
};

function dcsToLatLon(x, y, theater) {
  const o = THEATER_ORIGINS[theater] || THEATER_ORIGINS.Caucasus;
  const lat = o.lat + x / 111320;
  const lon = o.lon + y / (111320 * Math.cos(lat * Math.PI / 180));
  return { lat, lon };
}

function dms(deg, posDir, negDir) {
  const abs = Math.abs(deg);
  const d = Math.floor(abs);
  const mf = (abs - d) * 60;
  const m = Math.floor(mf);
  const s = ((mf - m) * 60).toFixed(1);
  const dir = deg >= 0 ? posDir : negDir;
  return `${dir}${String(d).padStart(2,'0')}°${String(m).padStart(2,'0')}'${s.padStart(4,'0')}"`;
}
const latDms = (v) => dms(v, 'N', 'S');
const lonDms = (v) => dms(v, 'E', 'W');

function decimalMinutes(deg, posDir, negDir, degreeWidth) {
  const abs = Math.abs(deg);
  const d = Math.floor(abs);
  const minutes = ((abs - d) * 60).toFixed(3);
  const dir = deg >= 0 ? posDir : negDir;
  return `${dir}${String(d).padStart(degreeWidth, '0')}°${minutes.padStart(6, '0')}'`;
}
const latDecimalMinutes = (v) => decimalMinutes(v, 'N', 'S', 2);
const lonDecimalMinutes = (v) => decimalMinutes(v, 'E', 'W', 3);

// DTC native format: "DD.MM.SSN" / "DDD.MM.SSE" (period-delimited, dir suffix, whole seconds)
function toDtcLat(lat) {
  const abs = Math.abs(lat);
  const d   = Math.floor(abs);
  const mf  = (abs - d) * 60;
  const m   = Math.floor(mf);
  const s   = Math.round((mf - m) * 60);
  const dir = lat >= 0 ? 'N' : 'S';
  return `${String(d).padStart(2,'0')}.${String(m).padStart(2,'0')}.${String(s).padStart(2,'0')}${dir}`;
}
function toDtcLon(lon) {
  const abs = Math.abs(lon);
  const d   = Math.floor(abs);
  const mf  = (abs - d) * 60;
  const m   = Math.floor(mf);
  const s   = Math.round((mf - m) * 60);
  const dir = lon >= 0 ? 'E' : 'W';
  return `${String(d).padStart(3,'0')}.${String(m).padStart(2,'0')}.${String(s).padStart(2,'0')}${dir}`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  Mission Extractor
// ═══════════════════════════════════════════════════════════════════════════
function extractFlightsByType(mission, theater, unitMatcher, aircraftType) {
  const flights = [];
  const coal = mission.coalition || {};

  for (const side of ['blue', 'red', 'neutrals']) {
    const countries = coal[side]?.country;
    if (!countries) continue;

    for (const ck of Object.keys(countries)) {
      const country = countries[ck];
      const planeGroups = country?.plane?.group;
      if (!planeGroups) continue;

      for (const gk of Object.keys(planeGroups)) {
        const group = planeGroups[gk];
        if (!group?.units) continue;

        // Gather matching units for the requested aircraft family
        const matchedUnits = [];
        for (const uk of Object.keys(group.units)) {
          const u = group.units[uk];
          if (unitMatcher(u?.type)) matchedUnits.push(u);
        }
        if (!matchedUnits.length) continue;

        // Waypoints from route.points
        const waypoints = [];
        let steerIdx = 0;
        const pts = group.route?.points || {};
        const ptKeys = Object.keys(pts).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);

        for (const k of ptKeys) {
          const pt = pts[k];
          if (!pt || pt.x === undefined) continue;
          const { lat, lon } = dcsToLatLon(pt.x, pt.y, theater);
          const type = pt.type || '';
          const isTakeoff = type.includes('TakeOff') || type.includes('Takeoff') || type === 'TakeOffParking';
          const isLand    = type === 'Land' || type === 'Landing';
          if (!isTakeoff && !isLand) steerIdx++;

          waypoints.push({
            seq: isTakeoff ? 0 : isLand ? -1 : steerIdx,
            isTakeoff, isLand,
            x:         pt.x,               // raw DCS theater coordinate (meters)
            y:         pt.y,               // raw DCS theater coordinate (meters)
            lat, lon,                      // display-only (flat-earth approximation)
            alt_m:     pt.alt    || 0,
            alt_ft:    Math.round((pt.alt || 0) * 3.28084),
            speed_ms:  pt.speed  || 0,
            speed_kts: Math.round((pt.speed || 0) * 1.94384),
            name:      pt.name   || '',
            alt_type:  pt.alt_type || 'BARO',
            type,
            pointType:  'STPT',  // pilot-selectable: STPT | IP | TGT | VRP | PUP | OA1 | OA2
            targetData: { vrpBearing: 0, vrpRange: 0.0, pupDistance: 0.0 }, // used when Type=TGT
          });
        }

        // Radio from first unit (all units share the same preset channels)
        const radio1 = {}, radio2 = {};
        const ref = matchedUnits[0];
        if (ref?.Radio) {
          const r1 = ref.Radio[1];
          const r2 = ref.Radio[2];
          if (r1?.channels) {
            for (const ch of Object.keys(r1.channels)) radio1[parseInt(ch)] = r1.channels[ch];
          }
          if (r2?.channels) {
            for (const ch of Object.keys(r2.channels)) radio2[parseInt(ch)] = r2.channels[ch];
          }
        }

        flights.push({
          groupId: group.groupId || gk,
          name:    group.name    || `Group ${gk}`,
          aircraftType,
          side,
          country: country.name || '',
          units: matchedUnits.map(u => ({
            name:     u.name     || '',
            callsign: u.callsign?.name || '',
            skill:    u.skill    || '',
          })),
          waypoints,
          radio1,
          radio2,
        });
      }
    }
  }
  return flights;
}

const isF16Type = (type) => typeof type === 'string' && (type === 'F-16C_50' || type.startsWith('F-16'));
const isF18Type = (type) => typeof type === 'string' && (type === 'FA-18C_hornet' || type.startsWith('FA-18') || type.startsWith('F/A-18') || type.startsWith('F-18'));

function extractF16Flights(mission, theater) {
  return extractFlightsByType(mission, theater, isF16Type, 'F-16C_50');
}

function extractF18Flights(mission, theater) {
  return extractFlightsByType(mission, theater, isF18Type, 'FA-18C_hornet');
}

function tcnCandidateKey(tcn) {
  return [
    tcn.channel ?? '',
    tcn.modeChannel ?? '',
    tcn.unitId ?? '',
    tcn.display_name ?? '',
    Number(tcn.x || 0).toFixed(1),
    Number(tcn.y || 0).toFixed(1),
  ].join('|');
}

function extractTacanCandidates(mission) {
  const out = [];
  const seen = new Set();
  const visited = new Set();
  const stack = [{ value: mission, path: 'mission' }];

  const asNum = (v) => {
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  };

  while (stack.length) {
    const { value, path } = stack.pop();
    if (!value || typeof value !== 'object') continue;
    if (visited.has(value)) continue;
    visited.add(value);

    if (!Array.isArray(value)) {
      const channel = asNum(value.channel ?? value.Channel);
      const channelMode = asNum(value.channelMode ?? value.ChannelMode);
      const mode = typeof value.modeChannel === 'string'
        ? value.modeChannel.toUpperCase()
        : channelMode === 1 ? 'Y' : 'X';

      const x = asNum(value.x ?? value.X ?? value?.point?.x ?? value?.position?.x);
      const y = asNum(value.y ?? value.Y ?? value?.point?.y ?? value?.position?.y);
      const unitId = asNum(value.unitId ?? value.UnitId ?? value.id);
      const callsign = typeof value.callsign === 'string'
        ? value.callsign
        : (typeof value?.callsign?.name === 'string' ? value.callsign.name : '');
      const displayName = value.display_name || value.displayName || value.name || '';

      const pathLower = path.toLowerCase();
      const keyHint = Object.keys(value).join(' ').toLowerCase();
      const hasHint = /tacan|beacon|tcn/.test(pathLower) || /tacan|beacon/.test(keyHint);
      const hasLocOrIdentity = (x !== null && y !== null) || unitId !== null || !!callsign || !!displayName;
      const looksLikeComm = pathLower.includes('comm1') || pathLower.includes('comm2') || pathLower.includes('comm.');

      if (!looksLikeComm && channel !== null && channel >= 1 && channel <= 126 && hasLocOrIdentity && (hasHint || value.modeChannel !== undefined || value.channelMode !== undefined || value.ChannelMode !== undefined)) {
        const tcn = {
          callsign: callsign || '',
          channel: Math.round(channel),
          display_name: displayName || `${callsign || 'TACAN'}_${Math.round(channel)}${mode}`,
          elevation: asNum(value.elevation ?? value.alt ?? 0) ?? 0,
          modeChannel: mode,
          unitId: unitId ?? 0,
          unitPointNum: asNum(value.unitPointNum ?? 1) ?? 1,
          x: x ?? 0,
          y: y ?? 0,
        };
        const key = tcnCandidateKey(tcn);
        if (!seen.has(key)) {
          seen.add(key);
          out.push(tcn);
        }
      }
    }

    for (const [k, v] of Object.entries(value)) {
      if (v && typeof v === 'object') {
        stack.push({ value: v, path: `${path}.${k}` });
      }
    }
  }

  return out.sort((a, b) => a.channel - b.channel || a.display_name.localeCompare(b.display_name));
}

const state = {
  theater: 'Caucasus',
  missionName: '',
  f16Flights: [],
  f18Flights: [],

// ═══════════════════════════════════════════════════════════════════════════
//  Rendering
// ═══════════════════════════════════════════════════════════════════════════
function wpTag(wp) {
  if (wp.isTakeoff) return `<span class="wptag wptag-tkof">TKOF</span>`;
  if (wp.isLand)    return `<span class="wptag wptag-rtb">RTB</span>`;
  return `<span class="wptag wptag-tp">TP</span>`;
}

function allFlights() {
  return [...state.f16Flights, ...state.f18Flights];
}

function findFlightById(groupId) {
  return allFlights().find(f => String(f.groupId) === String(groupId));
}

function renderFlights(flights, cfg) {
  const container = document.getElementById(cfg.containerId);
  container.innerHTML = '';

  document.getElementById(cfg.emptyId).style.display = flights.length ? 'none' : 'block';
  setSectionCount(cfg.sectionKey, flights.length);
  const formatLatitude = cfg.family === 'f16' ? latDecimalMinutes : latDms;
  const formatLongitude = cfg.family === 'f16' ? lonDecimalMinutes : lonDms;
  
  for (const fl of flights) {
    // Build unit chips
    const chips = fl.units.map(u =>
      `<span class="chip">${u.name}${u.callsign ? ` (${u.callsign})` : ''} <span class="skill">${u.skill}</span></span>`
    ).join('');

    // Waypoints rows — read-only mission view; role editing lives in the DTC Preview panel
    const wpRows = fl.waypoints.map((wp, i) => {
      const isNav = !wp.isTakeoff && !wp.isLand;
      const type  = (wp.pointType || 'STPT').toLowerCase();
      const sym   = { stpt:'○', ip:'□', tgt:'△', vrp:'◇', pup:'▽', oa1:'①', oa2:'②' }[type] || '○';
      const roleCell = isNav
        ? `<td><span class="pt-badge pt-${type}">${sym} ${wp.pointType || 'STPT'}</span></td>`
        : `<td style="color:var(--muted)">—</td>`;
      return `
      <tr>
        <td style="color:var(--muted);width:32px">${wp.isTakeoff || wp.isLand ? '—' : wp.seq}</td>
        <td style="width:58px">${wpTag(wp)}</td>
        ${roleCell}
        <td style="color:var(--muted)">${wp.name || '—'}</td>
        <td>${formatLatitude(wp.lat)}</td>
        <td>${formatLongitude(wp.lon)}</td>
        <td>${wp.alt_ft.toLocaleString()} <span style="color:var(--muted);font-size:10px">${wp.alt_type}</span></td>
        <td>${wp.speed_kts} <span style="color:var(--muted);font-size:10px">kts</span></td>
      </tr>`;
    }).join('');

    // COM channel rows helper
    const comRows = (radio, cls) => {
      const keys = Object.keys(radio).map(Number).sort((a, b) => a - b);
      return keys.map(ch =>
        `<tr><td style="color:var(--muted);width:80px">CH ${String(ch).padStart(2,'0')}</td><td class="${cls}">${Number(radio[ch]).toFixed(3)}</td></tr>`
      ).join('');
    };

    const card = document.createElement('div');
    card.className = 'flight-card collapsed';
    card.id = `fc-${cfg.cardPrefix}-${fl.groupId}`;
    card.innerHTML = `
      <div class="flight-head">
        <div class="flight-head-left" onclick="toggleFlightFromHead(this)">
          <span class="chevron">▼</span>
          <div>
            <div class="flight-name">${fl.name}</div>
            <div class="flight-meta">${fl.side.toUpperCase()} · ${fl.country} · ${fl.units.length} aircraft · ${fl.waypoints.length} route points</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
            <button class="btn btn-primary" type="button" data-family="${cfg.family}" data-gid="${String(fl.groupId).replace(/"/g, '&quot;')}" onclick="previewFlightButton(this)">👁 Preview</button>
            <button class="btn btn-success" type="button" data-family="${cfg.family}" data-gid="${String(fl.groupId).replace(/"/g, '&quot;')}" onclick="exportFlightButton(this)">⬇ Export</button>
          </div>
          <div class="unit-chips">${chips}</div>
        </div>
      </div>
      <div class="tabs" id="tabs-${cfg.cardPrefix}-${fl.groupId}">
        <div class="tab active" onclick="switchTab(${JSON.stringify(cfg.cardPrefix)}, ${JSON.stringify(fl.groupId)}, 'wpt', this)">Waypoints</div>
        <div class="tab" onclick="switchTab(${JSON.stringify(cfg.cardPrefix)}, ${JSON.stringify(fl.groupId)}, 'c1',  this)">COM1 — UHF</div>
        <div class="tab" onclick="switchTab(${JSON.stringify(cfg.cardPrefix)}, ${JSON.stringify(fl.groupId)}, 'c2',  this)">COM2 — VHF</div>
      </div>
      <div class="tab-content">
        <div class="tab-panel active" id="tp-${cfg.cardPrefix}-${fl.groupId}-wpt">
          <table>
            <thead><tr><th>#</th><th>Type</th><th>Role</th><th>Name</th><th>Latitude</th><th>Longitude</th><th>Altitude (ft)</th><th>Speed</th></tr></thead>
            <tbody>${wpRows || '<tr><td colspan="8" style="color:var(--muted);text-align:center">No waypoints</td></tr>'}</tbody>
          </table>
        </div>
        <div class="tab-panel" id="tp-${cfg.cardPrefix}-${fl.groupId}-c1">
          <table>
            <thead><tr><th>Channel</th><th>Frequency (MHz)</th></tr></thead>
            <tbody>${comRows(fl.radio1, 'uhf') || '<tr><td colspan="2" style="color:var(--muted)">No COM1 data</td></tr>'}</tbody>
          </table>
        </div>
        <div class="tab-panel" id="tp-${cfg.cardPrefix}-${fl.groupId}-c2">
          <table>
            <thead><tr><th>Channel</th><th>Frequency (MHz)</th></tr></thead>
            <tbody>${comRows(fl.radio2, 'vhf') || '<tr><td colspan="2" style="color:var(--muted)">No COM2 data</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
    card.innerHTML += `<div class="inline-preview-panel" id="inline-preview-${cfg.cardPrefix}-${fl.groupId}" data-family="${cfg.family}" data-gid="${String(fl.groupId).replace(/"/g, '&quot;')}"></div>`;
    container.appendChild(card);
  }
}

// Called when pilot changes a waypoint's role via the dropdown
function setWpType(sel) {
  const gid = sel.dataset.gid;
  const idx = parseInt(sel.dataset.idx, 10);
  const val = sel.value;

  // Update state
  const flight = findFlightById(gid);
  if (flight) flight.waypoints[idx].pointType = val;

  // Recolor the select to match the role (pt- prefix)
  sel.className = 'pttype pt-' + val.toLowerCase();

  // Toggle TargetData sub-row in the preview panel (pvtdr- prefix)
  const pvtdr = document.getElementById(`pvtdr-${gid}-${idx}`);
  if (pvtdr) pvtdr.style.display = val === 'TGT' ? 'table-row' : 'none';
}

// Called when a TargetData input changes (VRP bearing/range, PUP distance)
function setTargetData(inp) {
  const gid   = inp.dataset.gid;
  const idx   = parseInt(inp.dataset.idx, 10);
  const field = inp.dataset.field;
  const flight = findFlightById(gid);
  if (flight?.waypoints[idx]?.targetData) {
    flight.waypoints[idx].targetData[field] = parseFloat(inp.value) || 0;
  }
}

function deepClone(obj) {
  if (obj === null || obj === undefined) return obj;
  return JSON.parse(JSON.stringify(obj));
}

function defaultF18NavSettings() {
  return {
    AA_Waypoint: { AA_WP_Enabled: false, AA_WP_Number: 59 },
    ACLS: { Frequency: 225, OnOff: false },
    Altitude_Warning: { Warn_Alt_Baro: 2000, Warn_Alt_Rdr: 500 },
    Home_Waypoint: { FPAS_HOME_WP: 1 },
    ICLS: { Channel: 1, OnOff: false },
    TACAN: { Channel: 1, ChannelMode: 1, Mode: 2, OnOff: false },
  };
}

const F18_NAV_RULES = {
  'AA_Waypoint.AA_WP_Number':      { kind: 'int', min: 1, max: 59, step: 1 },
  'ACLS.Frequency':                { kind: 'int', min: 200, max: 400, step: 1 },
  'Altitude_Warning.Warn_Alt_Baro':{ kind: 'int', min: 0, max: 50000, step: 100 },
  'Altitude_Warning.Warn_Alt_Rdr': { kind: 'int', min: 0, max: 5000, step: 10 },
  'Home_Waypoint.FPAS_HOME_WP':    { kind: 'int', min: 1, max: 59, step: 1 },
  'ICLS.Channel':                  { kind: 'int', min: 1, max: 20, step: 1 },
  'TACAN.Channel':                 { kind: 'int', min: 1, max: 126, step: 1 },
  'TACAN.ChannelMode':             { kind: 'enum', options: [
    { value: 0, label: '0 (X)' },
    { value: 1, label: '1 (Y)' },
  ] },
  'TACAN.Mode':                    { kind: 'enum', options: [
    { value: 0, label: '0 (REC)' },
    { value: 1, label: '1 (TR)' },
    { value: 2, label: '2 (A/A TR)' },
  ] },
};

function getByPath(obj, path) {
  const parts = path.split('.');
  let cur = obj;
  for (const part of parts) {
    if (!cur || typeof cur !== 'object') return undefined;
    cur = cur[part];
  }
  return cur;
}

function setByPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = parts[i];
    if (!cur[k] || typeof cur[k] !== 'object') cur[k] = {};
    cur = cur[k];
  }
  cur[parts[parts.length - 1]] = value;
}

function setF18NavSetting(inp) {
  const gid = inp.dataset.gid;
  const path = inp.dataset.path;
  const kind = inp.dataset.kind;
  const flight = findFlightById(gid);
  if (!flight) return;

  if (!flight.navSettingsF18) {
    const base = state.personalDtc?._rawWypt?.NAV_SETTINGS || defaultF18NavSettings();
    flight.navSettingsF18 = deepClone(base);
  }

  let value = inp.value;
  if (kind === 'boolean') value = !!inp.checked;
  if (kind === 'number' || kind === 'int' || kind === 'enum') {
    const n = Number(inp.value);
    value = Number.isFinite(n) ? n : 0;
  }

  const rule = F18_NAV_RULES[path];
  if (rule && (kind === 'number' || kind === 'int')) {
    if (typeof rule.min === 'number') value = Math.max(rule.min, value);
    if (typeof rule.max === 'number') value = Math.min(rule.max, value);
    if (kind === 'int') value = Math.round(value);
    inp.value = String(value);
  }

  setByPath(flight.navSettingsF18, path, value);
}

function ensureF18TacanSelection(flight) {
  const keys = state.tacanCandidates.map(tcnCandidateKey);
  if (!keys.length) {
    flight.selectedTacanKeys = [];
    return;
  }
  if (!Array.isArray(flight.selectedTacanKeys)) {
    flight.selectedTacanKeys = [...keys];
    return;
  }
  const available = new Set(keys);
  flight.selectedTacanKeys = flight.selectedTacanKeys.filter(k => available.has(k));
  if (!flight.selectedTacanKeys.length) flight.selectedTacanKeys = [...keys];
}

function setF18TacanSelected(inp) {
  const gid = inp.dataset.gid;
  const key = inp.dataset.key;
  const flight = findFlightById(gid);
  if (!flight) return;
  ensureF18TacanSelection(flight);

  const set = new Set(flight.selectedTacanKeys || []);
  if (inp.checked) set.add(key);
  else set.delete(key);
  flight.selectedTacanKeys = [...set];
}

function switchInlinePreviewTabBtn(tabEl) {
  const panel = tabEl.dataset.panel;
  const wrap = tabEl.closest('.inline-preview-panel');
  if (!wrap) return;
  wrap.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  wrap.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  tabEl.classList.add('active');
  const target = wrap.querySelector(`.tab-panel[data-ipanel="${panel}"]`);
  if (target) target.classList.add('active');

  const flight = findFlightById(wrap.dataset.gid);
  if (flight) flight.inlinePreviewTab = panel;
}

function switchTab(cardPrefix, groupId, panel, tabEl) {
  const card = document.getElementById(`fc-${cardPrefix}-${groupId}`);
  card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  tabEl.classList.add('active');
  document.getElementById(`tp-${cardPrefix}-${groupId}-${panel}`).classList.add('active');
}

function setSectionCount(section, count) {
  const el = document.getElementById(`section-count-${section}`);
  if (el) el.textContent = `(${count})`;
}

function toggleSection(section) {
  const body = document.getElementById(`section-body-${section}`);
  const chev = document.getElementById(`section-chevron-${section}`);
  if (!body || !chev) return;
  body.classList.toggle('collapsed');
  chev.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
}

// ═══════════════════════════════════════════════════════════════════════════
//  DTC Preview Builder — internal format used only for the preview panel.
//  Steerpoints rendered directly from flight.waypoints (interactive dropdowns).
//  Radio channels rendered from flight.radio1/radio2.
//  CMDS/RWR rendered from state.personalDtc (native format).
// ═══════════════════════════════════════════════════════════════════════════
function buildDtc(flight) {
  // ── Radio — mission presets (used for preview COM tabs) ────────────────
  const personalUhf = state.personalDtc?.Radio?.UHF?.Channels || {};
  const personalVhf = state.personalDtc?.Radio?.VHF?.Channels || {};

  const uhfChannels = {}, vhfChannels = {};
  for (let i = 1; i <= 20; i++) {
    const freq1 = flight.radio1[i];
    const freq2 = flight.radio2[i];
    if (freq1 !== undefined) {
      uhfChannels[String(i)] = {
        Frequency: parseFloat(Number(freq1).toFixed(3)),
        Name: personalUhf[String(i)]?.Name || '',
      };
    }
    if (freq2 !== undefined) {
      vhfChannels[String(i)] = {
        Frequency: parseFloat(Number(freq2).toFixed(3)),
        Name: personalVhf[String(i)]?.Name || '',
      };
    }
  }

  // ── Countermeasures — only populated when a personal .dtc is loaded ──────
  const countermeasures = state.personalDtc?.Countermeasures || null;

  // ── EWS — only populated when a personal .dtc is loaded ────────────────
  const ews = state.personalDtc?.EWS || null;

  // ── Navigation steerpoints ─────────────────────────────────────────────
  // Exclude TakeOff and Landing. Keyed object "1"/{…}, "2"/{…}, …
  // Coordinates: DTC native DMS strings "DD.MM.SSN" / "DDD.MM.SSE".
  // TGT-type points carry an optional TargetData block.
  const steerpointObj = {};
  let stNum = 0;
  for (const wp of flight.waypoints.filter(wp => !wp.isTakeoff && !wp.isLand)) {
    stNum++;
    const entry = {
      Name: wp.name || `STPT${stNum}`,
      Type: wp.pointType || 'STPT',
      Lat:  toDtcLat(wp.lat),
      Long: toDtcLon(wp.lon),
      Alt:  wp.alt_ft,
    };
    if (wp.pointType === 'TGT' && wp.targetData) {
      entry.TargetData = {
        VRP_Bearing:  wp.targetData.vrpBearing,
        VRP_Range:    parseFloat(wp.targetData.vrpRange.toFixed(2)),
        PUP_Distance: parseFloat(wp.targetData.pupDistance.toFixed(2)),
      };
    }
    steerpointObj[String(stNum)] = entry;
  }

  return {
    Aircraft:         'F-16C_50',
    Version:          '1.0',
    Radio: {
      UHF: { Channels: uhfChannels },
      VHF: { Channels: vhfChannels },
    },
    ...(countermeasures ? { Countermeasures: countermeasures } : {}),
    ...(ews            ? { EWS: ews }              : {}),
    Navigation: {
      Steerpoints: steerpointObj,
    },
  };
}

// ═══════════════════════════════════════════════════════════════════════════
//  DTC Native Builder — outputs real DCS format for export
//  { data: { COMM, ELINT, MPD, NAV }, name, type }
//  COMM  = mission radio presets
//  ELINT = passthrough from personal .dtc (RWR priorities)
//  MPD   = passthrough from personal .dtc (CMDS programs)
//  NAV   = native NAV_PTS list from mission waypoints
// ═══════════════════════════════════════════════════════════════════════════
function buildDtcNative(flight) {
  // ── COMM — mission radio → Channel_N keys with integer MHz freq ───────────
  const comm1 = {}, comm2 = {};
  for (let i = 1; i <= 20; i++) {
    const f1 = flight.radio1[i];
    const f2 = flight.radio2[i];
    if (f1 !== undefined) comm1[`Channel_${i}`] = { freq: parseFloat(Number(f1).toFixed(3)), modulation: 1 };
    if (f2 !== undefined) comm2[`Channel_${i}`] = { freq: parseFloat(Number(f2).toFixed(3)), modulation: 1 };
  }
  const orderChannels = (channels) => Object.keys(channels)
    .sort((a, b) => a.localeCompare(b))
    .reduce((out, key) => {
      out[key] = channels[key];
      return out;
    }, {});

  // ── NAV — native NAV_PTS from mission (exclude takeoff/landing) ──────────
  const navWps = flight.waypoints.filter(w => !w.isTakeoff && !w.isLand);
  const navPts = [];
  let tos = 3600;
  for (let i = 0; i < navWps.length; i++) {
    const wp = navWps[i];
    const n = i + 1;
    const type = wp.pointType || 'STPT';
    const navId = `STPT${n}`;

    if (i > 0) {
      const prev = navWps[i - 1];
      const dx = (wp.x || 0) - (prev.x || 0);
      const dy = (wp.y || 0) - (prev.y || 0);
      const distM = Math.hypot(dx, dy);
      const speedMs = (wp.speed_ms > 0 ? wp.speed_ms : (prev.speed_ms > 0 ? prev.speed_ms : 220));
      tos += distM / speedMs;
    }

    navPts.push({
      alt: Math.max(0, Math.round(wp.alt_m || 0)),
      altitudeType: 1,
      FIX_Time: false,
      id: navId,
      idOA1: `OA1${n}`,
      idOA1_Line: `OA1${n}Line`,
      idOA2: `OA2${n}`,
      idOA2_Line: `OA2${n}Line`,
      isOAP_1: false,
      isOAP_2: false,
      isTOSEnabled: true,
      note: wp.name || '',
      number: n,
      OAP_1_Alt: 0,
      OAP_1_Bearing: 0,
      OAP_1_DeltaX: 0,
      OAP_1_DeltaY: 0,
      OAP_1_Range: 0,
      OAP_1_X: 0,
      OAP_1_Y: 0,
      OAP_2_Alt: 0,
      OAP_2_Bearing: 0,
      OAP_2_DeltaX: 0,
      OAP_2_DeltaY: 0,
      OAP_2_Range: 0,
      OAP_2_X: 0,
      OAP_2_Y: 0,
      R1: true,
      R2: false,
      R3: false,
      routeAltitude: Math.max(0, Math.round(wp.alt_ft || 0)),
      speed: Math.round((wp.speed_ms || 0) * 3.6),
      TOS: i === 0 ? 3600 : tos,
      type,
      velocityType: 3,
      x: wp.x || 0,
      y: wp.y || 0,
    });
  }

  // ── Passthrough ELINT and MPD from personal .dtc ─────────────────────────
  const pd = state.personalDtc;
  const elint = pd?._rawElint || {};
  const mpd   = pd?._rawMpd   || {};
  const mpdWithNav = {
    ...mpd,
    mirror_NAV_PTS: false,
    NAV_PTS: navPts,
    terrain: state.theater,
  };

  return {
    data: {
      COMM:  {
        COMM1: orderChannels(comm1),
        COMM2: orderChannels(comm2),
        mirror_COMM1: true,
        mirror_COMM2: true,
      },
      ELINT: elint,
      MPD:   mpdWithNav,
      terrain: state.theater,
      name: flight.name,
      type: 'F-16C_50',
    },
    name: flight.name,
    type: 'F-16C_50',
  };
}

function buildF18Dtc(flight) {
  const personalComm1 = state.personalDtc?._f18Comm?.COMM1 || {};
  const personalComm2 = state.personalDtc?._f18Comm?.COMM2 || {};
  const comm1 = {}, comm2 = {};

  for (let i = 1; i <= 20; i++) {
    const f1 = flight.radio1[i];
    const f2 = flight.radio2[i];
    if (f1 !== undefined) {
      comm1[`Channel_${i}`] = {
        frequency: parseFloat(Number(f1).toFixed(3)),
        modulation: 0,
        name: personalComm1[`Channel_${i}`]?.name || `CH ${i}`,
      };
    }
    if (f2 !== undefined) {
      comm2[`Channel_${i}`] = {
        frequency: parseFloat(Number(f2).toFixed(3)),
        modulation: 0,
        name: personalComm2[`Channel_${i}`]?.name || `CH ${i}`,
      };
    }
  }

  let tcn = [];
  if (state.tacanCandidates.length) {
    ensureF18TacanSelection(flight);
    const selected = new Set(flight.selectedTacanKeys || []);
    tcn = state.tacanCandidates
      .filter(t => selected.has(tcnCandidateKey(t)))
      .map(t => deepClone(t));
  } else {
    tcn = Array.isArray(state.personalDtc?._rawTcn) ? state.personalDtc._rawTcn : [];
  }
  const navSettingsBase = flight.navSettingsF18 || state.personalDtc?._rawWypt?.NAV_SETTINGS || defaultF18NavSettings();
  const navSettings = deepClone(navSettingsBase);
  const alr67 = state.personalDtc?._rawAlr67 || {
    CMDS: { CMDSProgramSettings: {}, CMDS_Threat_table: {} },
    RWR: { AAA: true, AI: true, FRND: false, NORM: true, UNK: true, RWR_Avionics_Threat_Table: {} },
  };

  return { COMM1: comm1, COMM2: comm2, TCN: tcn, NAV_SETTINGS: navSettings, ALR67: alr67 };
}

function buildF18DtcNative(flight) {
  const f18 = buildF18Dtc(flight);
  const orderChannels = (channels) => Object.keys(channels)
    .sort((a, b) => a.localeCompare(b))
    .reduce((out, key) => {
      out[key] = channels[key];
      return out;
    }, {});

  const navPts = flight.waypoints
    .filter(wp => !wp.isTakeoff && !wp.isLand)
    .map((wp, idx) => ({
      number: idx + 1,
      note: wp.name || '',
      x: wp.x || 0,
      y: wp.y || 0,
      alt: Math.max(0, Math.round(wp.alt_m || 0)),
      speed: Math.round((wp.speed_ms || 0) * 3.6),
      lat: toDtcLat(wp.lat),
      long: toDtcLon(wp.lon),
    }));

  const wyptRaw = state.personalDtc?._rawWypt || {};
  return {
    data: {
      ALR67: f18.ALR67,
      COMM: {
        COMM1: orderChannels(f18.COMM1),
        COMM2: orderChannels(f18.COMM2),
        mirror_COMM1: true,
        mirror_COMM2: true,
      },
      WYPT: {
        mirror_NAV_PTS: wyptRaw.mirror_NAV_PTS ?? false,
        NAV_PTS: navPts,
        NAV_ROUTE: wyptRaw.NAV_ROUTE || [],
        NAV_SETTINGS: f18.NAV_SETTINGS,
        terrain: state.theater,
      },
      TCN: f18.TCN,
      terrain: state.theater,
      name: flight.name,
      type: 'FA-18C_hornet',
    },
    name: flight.name,
    type: 'FA-18C_hornet',
  };
}

function buildF18PreviewHtml(flight, family) {
  const f18 = buildF18Dtc(flight);
  state.previewDtc = f18;
  ensureF18TacanSelection(flight);
  const allowedTabs = ['wpt', 'navset', 'c1', 'c2', 'tcn', 'cmds', 'rwr'];
  const activeTab = allowedTabs.includes(flight.inlinePreviewTab) ? flight.inlinePreviewTab : 'wpt';

  const navRows = flight.waypoints
    .filter(wp => !wp.isTakeoff && !wp.isLand)
    .map((wp, i) => `
      <tr>
        <td style="color:var(--muted)">${i + 1}</td>
        <td>${wp.name || ''}</td>
        <td>${toDtcLat(wp.lat)}</td>
        <td>${toDtcLon(wp.lon)}</td>
        <td>${wp.alt_ft.toLocaleString()} <span style="color:var(--muted);font-size:10px">ft</span></td>
      </tr>`).join('');

  const comRows = (comm, cls) => Object.entries(comm).map(([ch, d]) => `
    <tr>
      <td style="color:var(--muted)">${ch.replace('Channel_', 'CH ')}</td>
      <td class="${cls}">${Number(d.frequency).toFixed(3)}</td>
      <td style="color:var(--muted)">${d.name || ''}</td>
    </tr>`).join('');

  const selectedTcnKeys = new Set(flight.selectedTacanKeys || []);
  const tcnRows = state.tacanCandidates.length
    ? state.tacanCandidates.map(t => {
      const key = tcnCandidateKey(t);
      return `
    <tr>
      <td style="text-align:center"><input type="checkbox" data-gid="${flight.groupId}" data-key="${key}" ${selectedTcnKeys.has(key) ? 'checked' : ''} onchange="setF18TacanSelected(this)"></td>
      <td style="color:var(--muted)">${t.callsign || '—'}</td>
      <td>${t.channel || '—'}${t.modeChannel ? t.modeChannel : ''}</td>
      <td>${t.display_name || '—'}</td>
      <td>${Math.round(t.x || 0)} / ${Math.round(t.y || 0)}</td>
    </tr>`;
    }).join('')
    : (Array.isArray(f18.TCN) ? f18.TCN : []).map(t => `
    <tr>
      <td style="text-align:center;color:var(--muted)">—</td>
      <td style="color:var(--muted)">${t.callsign || '—'}</td>
      <td>${t.channel || '—'}${t.modeChannel ? t.modeChannel : ''}</td>
      <td>${t.display_name || '—'}</td>
      <td>${Math.round(t.x || 0)} / ${Math.round(t.y || 0)}</td>
    </tr>`).join('');

  const flattenObj = (obj, prefix = '') => {
    const rows = [];
    if (!obj || typeof obj !== 'object') return rows;
    for (const [k, v] of Object.entries(obj)) {
      const key = prefix ? `${prefix}.${k}` : k;
      if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
        rows.push(...flattenObj(v, key));
      } else {
        rows.push({ key, value: v, kind: typeof v });
      }
    }
    return rows;
  };

  const navSettingRows = flattenObj(f18.NAV_SETTINGS).map(({ key, value, kind }) => {
    const rule = F18_NAV_RULES[key];
    let input = '';
    if (kind === 'boolean') {
      input = `<input type="checkbox" data-gid="${flight.groupId}" data-path="${key}" data-kind="boolean" ${value ? 'checked' : ''} onchange="setF18NavSetting(this)">`;
    } else if (rule?.kind === 'enum') {
      const opts = rule.options.map(opt => `<option value="${opt.value}"${Number(value) === Number(opt.value) ? ' selected' : ''}>${opt.label}</option>`).join('');
      input = `<select class="tgt-inp" data-gid="${flight.groupId}" data-path="${key}" data-kind="enum" onchange="setF18NavSetting(this)">${opts}</select>`;
    } else if (kind === 'number' || rule?.kind === 'int' || rule?.kind === 'number') {
      const step = rule?.step ?? 1;
      const min = typeof rule?.min === 'number' ? ` min="${rule.min}"` : '';
      const max = typeof rule?.max === 'number' ? ` max="${rule.max}"` : '';
      const kindAttr = rule?.kind === 'int' ? 'int' : 'number';
      input = `<input class="tgt-inp" type="number" value="${value}"${min}${max} step="${step}" data-gid="${flight.groupId}" data-path="${key}" data-kind="${kindAttr}" oninput="setF18NavSetting(this)">`;
    } else {
      input = `<input class="tgt-inp" type="text" value="${value ?? ''}" data-gid="${flight.groupId}" data-path="${key}" data-kind="string" oninput="setF18NavSetting(this)">`;
    }
    return `
    <tr>
      <td style="color:var(--muted)">${key}</td>
      <td>${input}</td>
    </tr>`;
  }).join('');

  const cmdsRows = Object.entries(f18.ALR67?.CMDS?.CMDSProgramSettings || {}).map(([name, p]) => `
    <tr>
      <td style="color:var(--muted)">${name}</td>
      <td style="text-align:center">${p?.Chaff?.Quantity ?? 0}</td>
      <td style="text-align:center">${p?.Chaff?.Repeat ?? 0}</td>
      <td style="text-align:center">${p?.Chaff?.Interval ?? 0}</td>
      <td style="text-align:center">${p?.Flare?.Quantity ?? 0}</td>
    </tr>`).join('');

  const rwrTable = f18.ALR67?.RWR?.RWR_Avionics_Threat_Table || {};
  const rwrRows = Object.entries(rwrTable)
    .sort(([, a], [, b]) => (a?.PRI ?? 999) - (b?.PRI ?? 999))
    .slice(0, 80)
    .map(([threat, cfg]) => `
      <tr>
        <td style="color:var(--muted);text-align:center">${cfg?.PRI ?? '—'}</td>
        <td>${threat}</td>
        <td style="color:var(--muted)">${cfg?.display ? 'display' : ''}${cfg?.aspj_xmit ? ' · aspj' : ''}</td>
      </tr>`).join('');

  const rwrFlags = f18.ALR67?.RWR || {};
  const rwrFlagHtml = ['AAA', 'AI', 'FRND', 'NORM', 'UNK']
    .filter(k => Object.prototype.hasOwnProperty.call(rwrFlags, k))
    .map(k => `<div class="ews-item"><span class="ek">${k}</span>${rwrFlags[k] ? '<span class="ews-val-on">ON</span>' : '<span class="ews-val-off">OFF</span>'}</div>`)
    .join('');

  return `
    <div class="inline-preview-head">
      <div class="inline-preview-title">Preview — ${flight.name} (F/A-18C)</div>
      <button class="btn btn-outline" type="button" onclick="closeInlinePreview('${family}', '${flight.groupId}')">✕ Close</button>
    </div>
    <div class="inline-preview-body">
      <div class="tabs" style="padding:0;border-bottom:1px solid var(--border)">
        <div class="tab${activeTab==='wpt' ? ' active' : ''}" data-panel="wpt" onclick="switchInlinePreviewTabBtn(this)">Waypoints</div>
        <div class="tab${activeTab==='navset' ? ' active' : ''}" data-panel="navset" onclick="switchInlinePreviewTabBtn(this)">NAV Settings</div>
        <div class="tab${activeTab==='c1' ? ' active' : ''}" data-panel="c1" onclick="switchInlinePreviewTabBtn(this)">COMM1</div>
        <div class="tab${activeTab==='c2' ? ' active' : ''}" data-panel="c2" onclick="switchInlinePreviewTabBtn(this)">COMM2</div>
        <div class="tab${activeTab==='tcn' ? ' active' : ''}" data-panel="tcn" onclick="switchInlinePreviewTabBtn(this)">TACAN</div>
        <div class="tab${activeTab==='cmds' ? ' active' : ''}" data-panel="cmds" onclick="switchInlinePreviewTabBtn(this)">ALR67 CMDS</div>
        <div class="tab${activeTab==='rwr' ? ' active' : ''}" data-panel="rwr" onclick="switchInlinePreviewTabBtn(this)">ALR67 RWR</div>
      </div>
      <div class="tab-content" style="padding:10px 0 0">
      <div class="tab-panel${activeTab==='wpt' ? ' active' : ''}" data-ipanel="wpt">
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Latitude</th><th>Longitude</th><th>Altitude</th></tr></thead>
          <tbody>${navRows || '<tr><td colspan="5" style="color:var(--muted);text-align:center">No waypoints</td></tr>'}</tbody>
        </table>
      </div>
      <div class="tab-panel${activeTab==='navset' ? ' active' : ''}" data-ipanel="navset">
        <table>
          <thead><tr><th>Setting</th><th>Value</th></tr></thead>
          <tbody>${navSettingRows || '<tr><td colspan="2" style="color:var(--muted)">No NAV settings</td></tr>'}</tbody>
        </table>
      </div>
      <div class="tab-panel${activeTab==='c1' ? ' active' : ''}" data-ipanel="c1">
        <table>
          <thead><tr><th>CH</th><th>Frequency</th><th>Name</th></tr></thead>
          <tbody>${comRows(f18.COMM1, 'uhf') || '<tr><td colspan="3" style="color:var(--muted)">No COMM1 data</td></tr>'}</tbody>
        </table>
      </div>
      <div class="tab-panel${activeTab==='c2' ? ' active' : ''}" data-ipanel="c2">
        <table>
          <thead><tr><th>CH</th><th>Frequency</th><th>Name</th></tr></thead>
          <tbody>${comRows(f18.COMM2, 'vhf') || '<tr><td colspan="3" style="color:var(--muted)">No COMM2 data</td></tr>'}</tbody>
        </table>
      </div>
      <div class="tab-panel${activeTab==='tcn' ? ' active' : ''}" data-ipanel="tcn">
        <table>
          <thead><tr><th>Add</th><th>Callsign</th><th>Channel</th><th>Display Name</th><th>X/Y</th></tr></thead>
          <tbody>${tcnRows || '<tr><td colspan="5" style="color:var(--muted)">No TACAN data</td></tr>'}</tbody>
        </table>
        ${state.tacanCandidates.length ? '<p style="margin-top:8px;color:var(--muted);font-size:11px">Uncheck stations you do not want included in the exported F/A-18C DTC.</p>' : ''}
      </div>
      <div class="tab-panel${activeTab==='cmds' ? ' active' : ''}" data-ipanel="cmds">
        <table>
          <thead><tr><th>Program</th><th style="text-align:center">Chaff Qty</th><th style="text-align:center">Repeat</th><th style="text-align:center">Interval</th><th style="text-align:center">Flare Qty</th></tr></thead>
          <tbody>${cmdsRows || '<tr><td colspan="5" style="color:var(--muted)">No ALR67 CMDS data</td></tr>'}</tbody>
        </table>
      </div>
      <div class="tab-panel${activeTab==='rwr' ? ' active' : ''}" data-ipanel="rwr">
        ${rwrFlagHtml ? `<div class="ews-grid" style="margin-bottom:12px">${rwrFlagHtml}</div>` : ''}
        <table>
          <thead><tr><th style="text-align:center">PRI</th><th>Threat</th><th>Flags</th></tr></thead>
          <tbody>${rwrRows || '<tr><td colspan="3" style="color:var(--muted)">No ALR67 RWR threats</td></tr>'}</tbody>
        </table>
      </div>
      </div>
    </div>
  `;
}

        <td style="color:var(--text);text-align:center">${c.BurstQuantity ?? 0} × ${c.SalvoQuantity ?? 0}</td>
        <td style="color:var(--text);text-align:center">${f.BurstQuantity ?? 0} × ${f.SalvoQuantity ?? 0}</td>
        <td style="color:var(--text);text-align:center">${c.BurstInterval ?? 0}s</td>
        <td style="color:var(--text);text-align:center">${c.SalvoInterval ?? 0}s</td>
      </tr>`;
    }).join('');
  }

  const hasCmds = !!dtc.Countermeasures;

  return `
    <div class="inline-preview-head">
      <div class="inline-preview-title">Preview — ${flight.name} (F-16C)</div>
      <button class="btn btn-outline" type="button" onclick="closeInlinePreview('${family}', '${flight.groupId}')">✕ Close</button>
    </div>
    <div class="inline-preview-body">
      <div class="tabs" style="padding:0;border-bottom:1px solid var(--border)">
        <div class="tab${activeTab==='wpt' ? ' active' : ''}" data-panel="wpt" onclick="switchInlinePreviewTabBtn(this)">Waypoints</div>
        <div class="tab${activeTab==='c1' ? ' active' : ''}" data-panel="c1" onclick="switchInlinePreviewTabBtn(this)">COM1</div>
        <div class="tab${activeTab==='c2' ? ' active' : ''}" data-panel="c2" onclick="switchInlinePreviewTabBtn(this)">COM2</div>
        ${hasCmds ? `<div class="tab${activeTab==='cmds' ? ' active' : ''}" data-panel="cmds" onclick="switchInlinePreviewTabBtn(this)">CMDS</div>` : ''}
      </div>
      <div class="tab-content" style="padding:10px 0 0">
      <div class="tab-panel${activeTab==='wpt' ? ' active' : ''}" data-ipanel="wpt">
        <table>
          <thead><tr><th>Waypoint</th><th>Name</th><th>Role</th><th>Latitude</th><th>Longitude</th><th>Altitude</th></tr></thead>
          <tbody>${steerRows || '<tr><td colspan="6" style="color:var(--muted);text-align:center">No steerpoints</td></tr>'}</tbody>
        </table>
      </div>
      <div class="tab-panel${activeTab==='c1' ? ' active' : ''}" data-ipanel="c1">
        <table>
          <thead><tr><th>CH</th><th>Frequency</th><th>Name</th></tr></thead>
          <tbody>${comRows(dtc.Radio.UHF.Channels, 'uhf') || '<tr><td colspan="3" style="color:var(--muted)">No COM1 data</td></tr>'}</tbody>
        </table>
      </div>
      <div class="tab-panel${activeTab==='c2' ? ' active' : ''}" data-ipanel="c2">
        <table>
          <thead><tr><th>CH</th><th>Frequency</th><th>Name</th></tr></thead>
          <tbody>${comRows(dtc.Radio.VHF.Channels, 'vhf') || '<tr><td colspan="3" style="color:var(--muted)">No COM2 data</td></tr>'}</tbody>
        </table>
      </div>
      ${hasCmds ? `
      <div class="tab-panel${activeTab==='cmds' ? ' active' : ''}" data-ipanel="cmds">
        <table>
          ${cmdsIsNative
            ? `<thead><tr><th>Program</th><th style="text-align:center">Chaff BQ×SQ</th><th style="text-align:center">Flare BQ×SQ</th><th style="text-align:center">Burst Intv</th><th style="text-align:center">Salvo Intv</th></tr></thead>`
            : `<thead><tr><th>Program</th><th style="text-align:center">Chaff</th><th style="text-align:center">Flare</th><th style="text-align:center">Interval</th><th style="text-align:center">Cycles</th></tr></thead>`
          }
          <tbody>${cmdsRows}</tbody>
        </table>
      </div>` : ''}
      </div>
    </div>
  `;
}

// ── Step 1: build + render the preview panel ───────────────────────────────
function previewDtc(family = 'f16', groupId = null) {
  const isF18 = family === 'f18';
  const flights = isF18 ? state.f18Flights : state.f16Flights;
  const flight = groupId !== null
    ? flights.find(f => String(f.groupId) === String(groupId))
    : flights[0];
  if (!flight) return alert('Select a flight first.');

  // Ensure the relevant aircraft section and flight card are expanded before showing preview.
  const sectionBody = document.getElementById(`section-body-${family}`);
  const sectionChevron = document.getElementById(`section-chevron-${family}`);
  if (sectionBody?.classList.contains('collapsed')) {
    sectionBody.classList.remove('collapsed');
    if (sectionChevron) sectionChevron.style.transform = 'rotate(0deg)';
  }

  const card = document.getElementById(`fc-${family}-${flight.groupId}`);
  if (card?.classList.contains('collapsed')) card.classList.remove('collapsed');

  const previewId = `inline-preview-${family}-${flight.groupId}`;
  const preview = document.getElementById(previewId);
  if (!preview) return;

  const html = isF18 ? buildF18PreviewHtml(flight, family) : buildF16PreviewHtml(flight, family);
  preview.innerHTML = html;
  preview.classList.add('open');
  preview.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeInlinePreview(family, groupId) {
  const preview = document.getElementById(`inline-preview-${family}-${groupId}`);
  if (!preview) return;
  preview.classList.remove('open');
  preview.innerHTML = '';
}

function previewFlightButton(btn) {
  previewDtc(btn.dataset.family, btn.dataset.gid);
}

function exportFlightDtc(family, groupId) {
  const flights = family === 'f18' ? state.f18Flights : state.f16Flights;
  const flight = flights.find(f => String(f.groupId) === String(groupId));
  if (!flight) return;

  const dtc = family === 'f18' ? buildF18DtcNative(flight) : buildDtcNative(flight);
  const name = (flight.name || 'flight').replace(/[^a-zA-Z0-9_\-]/g, '_');

  const json = JSON.stringify(dtc, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${name}.dtc`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportFlightButton(btn) {
  exportFlightDtc(btn.dataset.family, btn.dataset.gid);
}

// ── Collapse / expand a flight card ────────────────────────────────────────
function toggleFlightFromHead(headEl) {
  const card = headEl.closest('.flight-card');
  if (card) card.classList.toggle('collapsed');
}

function toggleFlight(cardPrefix, gid) {
  // Backward-compatible wrapper for any old inline handlers.
  const card = document.getElementById(`fc-${cardPrefix}-${gid}`);
  if (card) card.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════════════════════════
//  File Handlers
// ═══════════════════════════════════════════════════════════════════════════
function showStatus(html) {
  const sb = document.getElementById('status-bar');
  sb.style.display = 'block';
  sb.innerHTML = html;
}

async function handleMizFile(file) {
  if (!file) return;

  document.getElementById('miz-fname').textContent = file.name;
  document.getElementById('miz-card').classList.add('active');
  document.getElementById('results').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  showStatus('<span class="warn">⟳ Parsing mission…</span>');

  try {
    const zip  = await JSZip.loadAsync(file);
    const mf   = zip.file('mission');
    if (!mf) throw new Error('No "mission" file found inside the .miz archive.');

    // Detect theater
    const tf = zip.file('theatre');
    if (tf) state.theater = (await tf.async('string')).trim();

    state.missionName = file.name.replace(/\.miz$/i, '');

    // Check for native .dtc files (March 2026 feature — format TBD)
    const nativeDtcs = Object.keys(zip.files).filter(f => f.toLowerCase().endsWith('.dtc'));

    const lua = await mf.async('string');
    const parsed = new LuaParser(lua).parse();
    const mission = parsed.mission;
    if (!mission) throw new Error('Could not parse mission table from Lua file.');

    state.f16Flights = extractF16Flights(mission, state.theater);
    state.f18Flights = extractF18Flights(mission, state.theater);
    state.tacanCandidates = extractTacanCandidates(mission);
    renderFlights(state.f16Flights, {
      containerId: 'flights-container-f16',
      emptyId: 'no-f16s',
      cardPrefix: 'f16',
      family: 'f16',
      sectionKey: 'f16',
    });
    renderFlights(state.f18Flights, {
      containerId: 'flights-container-f18',
      emptyId: 'no-f18s',
      cardPrefix: 'f18',
      family: 'f18',
      sectionKey: 'f18',
    });

    const dtcWarn = nativeDtcs.length
      ? ` <span class="warn">· Native .dtc found (${nativeDtcs.join(', ')}) — format not yet parsed</span>`
      : '';

    showStatus(
      `<span class="ok">✓</span> ${state.theater} · ${state.missionName} · ` +
      `<span class="ok">${state.f16Flights.length}</span> F-16C flight(s) · ` +
      `<span class="ok">${state.f18Flights.length}</span> F/A-18C flight(s) · ` +
      `<span class="ok">${state.tacanCandidates.length}</span> TACAN station(s)${dtcWarn}`
    );

  } catch (err) {
    showStatus(`<span class="err">✗ ${err.message}</span>`);
    console.error(err);
  }
}

document.getElementById('miz-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  await handleMizFile(file);
});

// ── .dtc format normalizer ────────────────────────────────────────────────
// Parses real DCS native format for both F-16 and F/A-18 families.
// Written by DCS itself; stored in Saved Games\DCS\dtc\
// Stores raw blocks for lossless re-export.
function normalizeDtc(raw) {
  if (!raw.data?.COMM) return null; // unrecognized format

  const isF18 = isF18Type(raw.type || '');

  if (isF18) {
    const out = {
      Aircraft: raw.type || 'FA-18C_hornet',
      _native: true,
      _aircraft: 'F18',
      _rawAlr67: raw.data.ALR67 || null,
      _rawTcn: Array.isArray(raw.data.TCN) ? raw.data.TCN : [],
      _rawWypt: raw.data.WYPT || null,
      _f18Comm: raw.data.COMM || null,
    };

    const uhfCh = {}, vhfCh = {};
    const comm1 = raw.data.COMM.COMM1 || {};
    const comm2 = raw.data.COMM.COMM2 || {};
    for (let i = 1; i <= 20; i++) {
      const u = comm1[`Channel_${i}`];
      const v = comm2[`Channel_${i}`];
      if (u) uhfCh[String(i)] = { Frequency: u.frequency, Name: u.name || '' };
      if (v) vhfCh[String(i)] = { Frequency: v.frequency, Name: v.name || '' };
    }
    out.Radio = { UHF: { Channels: uhfCh }, VHF: { Channels: vhfCh } };

    return out;
  }

  const out = {
    Aircraft:  raw.type || 'F-16C_50',
    _native:   true,
    _aircraft: 'F16',
    _rawElint: raw.data.ELINT || null,   // passthrough for export
    _rawMpd:   raw.data.MPD   || null,   // passthrough for export
  };

  // Radio — Channel_N keys → internal Channels dict (freq is already MHz)
  const uhfCh = {}, vhfCh = {};
  const comm1 = raw.data.COMM.COMM1 || {};
  const comm2 = raw.data.COMM.COMM2 || {};
  for (let i = 1; i <= 20; i++) {
    const u = comm1[`Channel_${i}`];
    const v = comm2[`Channel_${i}`];
    if (u) uhfCh[String(i)] = { Frequency: u.freq, Name: '' };
    if (v) vhfCh[String(i)] = { Frequency: v.freq, Name: '' };
  }
  out.Radio = { UHF: { Channels: uhfCh }, VHF: { Channels: vhfCh } };

  // CMDS — store native programs for display; raw block passes through to export
  const cmdsRaw = raw.data.MPD?.CMDS;
  if (cmdsRaw) {
    out.Countermeasures = {
      _nativePrograms:  cmdsRaw.CMDSProgramSettings || {},
      _nativeBingo:     cmdsRaw.CMDSBingoSettings   || {},
      _nativeThreatMap: cmdsRaw.CMDSPrograms         || {},
    };
  }

  // RWR — keep raw structure for display
  const rwrRaw = raw.data.ELINT?.RWR;
  if (rwrRaw) {
    out.EWS = { RWR: rwrRaw };
  }

  return out;
}

async function handleDtcFile(file) {
  if (!file) return;

  document.getElementById('dtc-fname').textContent = file.name;
  document.getElementById('dtc-card').classList.add('active');

  const text = await file.text();
  let parsed = null;

  try {
    parsed = JSON.parse(text);
  } catch {
    alert('Could not parse .dtc file — expected JSON format (from Saved Games\\DCS\\dtc\\).');
    document.getElementById('dtc-fname').textContent = '';
    document.getElementById('dtc-card').classList.remove('active');
    return;
  }

  const normalized = normalizeDtc(parsed);
  if (!normalized) {
    alert('Unrecognized .dtc format.\nExpected real DCS native format with at least { "data": { "COMM" }, "name", "type" }.\nLoad a .dtc from your Saved Games\\DCS\\dtc\\ folder.');
    document.getElementById('dtc-fname').textContent = '';
    document.getElementById('dtc-card').classList.remove('active');
    return;
  }
  state.personalDtc = normalized;

  // Re-render the preview if one is already showing so CMDS/Threats tabs appear immediately
  // Re-render any open inline previews so merged tabs update immediately.
  document.querySelectorAll('.inline-preview-panel.open').forEach(panel => {
    previewDtc(panel.dataset.family, panel.dataset.gid);
  });

  // Build a summary of what will be merged
  const parts = [];
  if (normalized._native) {
    if (normalized._aircraft === 'F18') {
      if (normalized._rawAlr67?.CMDS) parts.push('ALR67 CMDS');
      if (normalized._rawAlr67?.RWR)  parts.push('ALR67 RWR');
      if (normalized._rawTcn?.length) parts.push('TACAN presets');
      if (normalized._rawWypt?.NAV_SETTINGS) parts.push('NAV settings');
      if (normalized.Radio)           parts.push('radio presets');
    } else {
      // Real DCS native format — describe what sections are present
      if (normalized._rawMpd?.CMDS)   parts.push('CMDS (MAN1-6/AUTO1-3/BYP)');
      if (normalized._rawElint?.RWR)  parts.push('RWR priorities');
      if (normalized.Radio)           parts.push('radio presets');
    }
  } else {
    if (normalized.Countermeasures) parts.push('CMDS');
    if (normalized.EWS)             parts.push('EWS');
    if (normalized.Radio)           parts.push('channel names');
    if (normalized.LaserCodes)      parts.push('laser codes');
  }
  const mergeDesc = parts.length ? parts.join(' + ') : 'data';

  document.getElementById('merge-pill').style.display = 'inline-flex';
  document.getElementById('merge-pill').textContent   = `✓ Merging ${mergeDesc} from ${file.name}`;
  document.getElementById('dtc-clear-btn').style.display = 'inline-flex';
}

document.getElementById('dtc-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  await handleDtcFile(file);
});

function clearPersonalDtc(e) {
  e.preventDefault();
  state.personalDtc = null;
  document.getElementById('dtc-input').value = '';
  document.getElementById('dtc-fname').textContent = '';
  document.getElementById('dtc-card').classList.remove('active');
  document.getElementById('dtc-clear-btn').style.display = 'none';
  document.getElementById('merge-pill').style.display = 'none';
}

// ── Drag & Drop support ────────────────────────────────────────────────────
for (const id of ['miz-card', 'dtc-card']) {
  const card  = document.getElementById(id);
  const input = card.querySelector('input[type=file]');

  card.addEventListener('dragover', e => { e.preventDefault(); card.style.borderColor = 'var(--accent)'; });
  card.addEventListener('dragleave', () => { card.style.borderColor = ''; });
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.style.borderColor = '';
    const f = e.dataTransfer.files[0];
    if (!f) return;
    if (id === 'miz-card') {
      handleMizFile(f);
    } else {
      handleDtcFile(f);
    }
  });
}
